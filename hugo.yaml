baseURL: "https://deflockstpete.com"

# Hugo configuration file
title: DeFlock St Pete

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: About
      pageRef: /about
      weight: 1
    - name: Get Involved
      pageRef: /get_involved
      weight: 2
    - name: Public Records
      pageRef: /public_records
      weight: 3
    - name: Contact ↗
      url: "mailto:DeFlockStPete@proton.me"
      weight: 4
      params:
        icon: mail

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/DeFlockStPete/DeFlockStPete/edit/main/content"
